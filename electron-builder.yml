appId: com.face-search.app
productName: Face Search
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
asar: true
asarUnpack:
  - "**/*.node"
nodeGypRebuild: false
npmRebuild: true
